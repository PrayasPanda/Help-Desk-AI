services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quickdesk
      POSTGRES_PASSWORD: quickdesk
      POSTGRES_DB: quickdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
